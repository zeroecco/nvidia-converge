name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile package
        run: python -m compileall -q nvidia_converge tests

      - name: Run stdlib test suite
        run: python tests/run_tests.py

      - name: Install test tooling
        run: python -m pip install --upgrade pip ".[test]"

      - name: Run pytest suite
        run: python -m pytest -q

      - name: Smoke test module CLI
        run: |
          python -m nvidia_converge --help
          python -m nvidia_converge plan --json | python -m json.tool >/dev/null

      - name: Smoke test checkout launcher
        run: ./nvidia-converge --help

      - name: Build package artifacts
        run: |
          python -m pip install build
          python -m build

      - name: Smoke test built wheel
        run: |
          python -m pip install --force-reinstall dist/*.whl
          nvidia-converge --version
