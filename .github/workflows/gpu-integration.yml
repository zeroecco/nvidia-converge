name: GPU Integration

on:
  workflow_dispatch:
    inputs:
      desired:
        description: "Desired-state file to use"
        required: false
        default: "examples/compute-580-open.yaml"
      apply:
        description: "Run host-mutating install/verify/lock/rollback steps"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  gpu:
    name: Self-hosted GPU node
    runs-on: [self-hosted, nvidia-gpu, disposable]
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Capture pre-state
        shell: bash
        run: |
          mkdir -p artifacts/pre artifacts/reports
          uname -a | tee artifacts/pre/uname.txt
          if command -v nvidia-smi; then nvidia-smi -q > artifacts/pre/nvidia-smi-q.txt || true; fi
          if command -v dkms; then dkms status > artifacts/pre/dkms-status.txt || true; fi
          if command -v modinfo; then modinfo nvidia > artifacts/pre/modinfo-nvidia.txt || true; fi

      - name: Install test tooling
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --upgrade pip
          .venv/bin/python -m pip install ".[test]"

      - name: Plan
        run: .venv/bin/python -m nvidia_converge plan --desired "${{ inputs.desired }}" --out artifacts/reports/plan.json

      - name: Validate plan report schema
        run: |
          .venv/bin/python - <<'PY'
          import json
          import jsonschema
          from nvidia_converge.schemas import load_schema
          with open("artifacts/reports/plan.json", encoding="utf-8") as handle:
              jsonschema.validate(json.load(handle), load_schema("report"))
          PY

      - name: Install
        if: ${{ inputs.apply }}
        run: sudo env PYTHONPATH="$PWD" "$PWD/.venv/bin/python" -m nvidia_converge install --desired "${{ inputs.desired }}" --apply --out artifacts/reports/install.json

      - name: Locate rollback snapshot
        if: ${{ inputs.apply }}
        shell: bash
        run: |
          .venv/bin/python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path("artifacts/reports/install.json").read_text(encoding="utf-8"))
          snapshot = report.get("rollback", {}).get("path")
          if not snapshot:
              raise SystemExit("install report did not include a persisted rollback snapshot path")
          Path("artifacts/reports/rollback-snapshot-path.txt").write_text(snapshot + "\n", encoding="utf-8")
          PY

      - name: Verify
        if: ${{ inputs.apply }}
        run: sudo env PYTHONPATH="$PWD" "$PWD/.venv/bin/python" -m nvidia_converge verify --desired "${{ inputs.desired }}" --apply --out artifacts/reports/verify.json

      - name: Lock
        if: ${{ inputs.apply }}
        run: sudo env PYTHONPATH="$PWD" "$PWD/.venv/bin/python" -m nvidia_converge lock --desired "${{ inputs.desired }}" --apply --out artifacts/reports/lock.json

      - name: Rollback
        if: ${{ inputs.apply }}
        shell: bash
        run: |
          snapshot="$(cat artifacts/reports/rollback-snapshot-path.txt)"
          sudo env PYTHONPATH="$PWD" "$PWD/.venv/bin/python" -m nvidia_converge rollback --desired "${{ inputs.desired }}" --snapshot "$snapshot" --apply --out artifacts/reports/rollback.json

      - name: Verify after rollback
        if: ${{ inputs.apply }}
        run: sudo env PYTHONPATH="$PWD" "$PWD/.venv/bin/python" -m nvidia_converge verify --desired "${{ inputs.desired }}" --apply --out artifacts/reports/verify-after-rollback.json

      - name: Validate generated report schemas
        if: always()
        run: |
          .venv/bin/python - <<'PY'
          import json
          from pathlib import Path

          import jsonschema

          from nvidia_converge.schemas import load_schema

          schema = load_schema("report")
          reports = sorted(Path("artifacts/reports").glob("*.json"))
          if not reports:
              raise SystemExit("no report JSON files were generated")
          for report in reports:
              with report.open(encoding="utf-8") as handle:
                  jsonschema.validate(json.load(handle), schema)
              print(f"validated {report}")
          PY

      - name: Capture post-state
        if: always()
        shell: bash
        run: |
          mkdir -p artifacts/post
          uname -a | tee artifacts/post/uname.txt
          if command -v nvidia-smi; then nvidia-smi -q > artifacts/post/nvidia-smi-q.txt || true; fi
          if command -v dkms; then dkms status > artifacts/post/dkms-status.txt || true; fi
          if command -v modinfo; then modinfo nvidia > artifacts/post/modinfo-nvidia.txt || true; fi
          for log in /var/log/apt/history.log /var/log/dnf.log /var/log/yum.log /var/log/zypp/history; do
            if [ -r "$log" ]; then cp "$log" "artifacts/post/$(basename "$log")"; fi
          done

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gpu-integration-${{ github.run_id }}
          path: artifacts/
