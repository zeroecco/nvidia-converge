name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run release gates
        run: |
          python -m pip install --upgrade pip ".[test]"
          python -m compileall -q nvidia_converge tests
          python tests/run_tests.py
          python -m ruff check .
          python -m mypy nvidia_converge
          python -m pytest -q

      - name: Build artifacts
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Smoke test wheel
        run: |
          python -m pip install --force-reinstall dist/*.whl
          nvidia-converge --version
          nvidia-converge validate --desired examples/compute-580-open.yaml
          nvidia-converge schema desired | python -m json.tool >/dev/null
          nvidia-converge schema integration-results | python -m json.tool >/dev/null
          nvidia-converge schema report | python -m json.tool >/dev/null

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          sha256sum --check SHA256SUMS

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
